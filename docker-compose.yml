services:
  strapi:
    container_name: knitting-backend
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/opt/app/.tmp
    expose:
      - "1337"

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - strapi